{% extends "base.html" %}
{% block content %}

<div class="form-card">
  <h2>{{ action }} Job Application</h2>
  <form method="post">
    <div class="form-row">
      <div class="form-group">
        <label for="company">Company <span class="required">*</span></label>
        <input type="text" id="company" name="company" value="{{ job.company or '' }}" required />
      </div>
      <div class="form-group">
        <label for="position">Position <span class="required">*</span></label>
        <input type="text" id="position" name="position" value="{{ job.position or '' }}" required />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="status">Status</label>
        <select id="status" name="status">
          {% for s in statuses %}
          <option value="{{ s }}" {% if job.status == s %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="applied_date">Date Applied</label>
        <input type="date" id="applied_date" name="applied_date" value="{{ job.applied_date or '' }}" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="location">Location</label>
        <input type="text" id="location" name="location" value="{{ job.location or '' }}" />
      </div>
      <div class="form-group">
        <label for="salary">Salary / Pay Range</label>
        <input type="text" id="salary" name="salary" value="{{ job.salary or '' }}" placeholder="e.g. $80k–$100k" />
      </div>
    </div>

    <div class="form-group">
      <label for="url">Job Posting URL</label>
      <input type="url" id="url" name="url" value="{{ job.url or '' }}" placeholder="https://..." />
    </div>

    <div class="form-group">
      <label for="notes">Notes</label>
      <textarea id="notes" name="notes" rows="4" placeholder="Recruiter contact, interview rounds, follow-up dates…">{{ job.notes or '' }}</textarea>
    </div>

    <div class="form-actions">
      <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary">{{ action }}</button>
    </div>
  </form>
</div>

{% endblock %}
